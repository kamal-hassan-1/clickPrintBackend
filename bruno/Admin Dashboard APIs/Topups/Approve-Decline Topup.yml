info:
  name: Approve/Decline Topup
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{host}}/api/topups/:topupId"
  params:
    - name: topupId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "action": "approve"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
