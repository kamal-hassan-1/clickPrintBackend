info:
  name: Create New Price
  type: http
  seq: 4

http:
  method: POST
  url: "{{host}}/api/shops/:shopId/prices"
  params:
    - name: shopId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Colored A4 Page Single Sided",
        "rate": 20,
        "keys": {
          "colored": true,
          "pageType": "A4",
          "sidedness": false
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
