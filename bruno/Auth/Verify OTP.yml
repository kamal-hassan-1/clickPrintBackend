info:
  name: Verify OTP
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/api/auth/verify"
  body:
    type: json
    data: |-
      {
        "code": "53760",
        "number": "{{number}}"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data && data.success && data.data && data.data.token)
          bru.setEnvVar("token", data.data.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
