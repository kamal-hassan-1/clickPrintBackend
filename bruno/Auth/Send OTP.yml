info:
  name: Send OTP
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/api/auth/otp"
  body:
    type: json
    data: |-
      {
        "number": "923235400291",
        "actor" : "user"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const reqBody = req.getBody();
        if (reqBody && reqBody.number)
          bru.setEnvVar("number", reqBody.number);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
