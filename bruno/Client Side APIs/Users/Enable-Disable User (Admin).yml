info:
  name: Enable/Disable User (Admin)
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{host}}/api/users/:userId/isDisabled"
  params:
    - name: userId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "isDisabled": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
