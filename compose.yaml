volumes:
  mongo:

services:
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  backend:
    build: .
    restart: unless-stopped
    ports:
      - 3005:3000
    volumes:
      - ./files:/app/files
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN}
      MONGODB_URI: ${MONGODB_URI}
      NOTIFYBOT_URL: ${NOTIFYBOT_URL}
      NOTIFYBOT_API_KEY: ${NOTIFYBOT_API_KEY}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
      GOTENBERG_WEBHOOK_URL: ${GOTENBERG_WEBHOOK_URL:-http://backend:3000}