volumes:
  mongo:

services:
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  backend:
    build: .
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./files:/app/files
    environment:
      MONGODB_URI: ${MONGODB_URI}
      NOTIFYBOT_URL: ${NOTIFYBOT_URL}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN}
      SAFEPAY_WEBHOOK_SECRET: ${SAFEPAY_WEBHOOK_SECRET}
      GOTENBERG_URL: http://gotenberg:3000
      GOTENBERG_WEBHOOK_URL: http://backend:3000
      JWT_SECRET: thisisabadsecretthisisabadsecret
      SERVICE_KEY: thisisabadsecretthisisabadsecret