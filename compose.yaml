services:
  mongo:
    image: mongo
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    ports:
      - 127.0.0.1:8081:8081
    environment:
      ME_CONFIG_BASICAUTH: false
      ME_CONFIG_MONGODB_URL: mongodb://mongo

  backend:
    build: .
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./files:/app/files
    environment:
      JWT_SECRET: ${JWT_SECRET}
      NOTIFYBOT_URL: ${NOTIFYBOT_URL}
      ABSOLUTE_URI: http://backend:3000
      GOTENBERG_URI: http://gotenberg:3000
      MONGODB_URI: mongodb://mongo/ClickPrint?authSource=admin