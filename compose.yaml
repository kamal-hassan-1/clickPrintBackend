volumes:
  mongo:
  notifybot:

services:
  mongo:
    image: mongo
    restart: unless-stopped
    volumes:
      - mongo:/data/db

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
  
  notifybot:
    image: ghcr.io/ahad19n/notifybot:latest
    restart: unless-stopped
    volumes:
      - notifybot:/data
    environment:
      API_KEY: thisisabadapikeythisisabadapikey

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    ports:
      - 127.0.0.1:8081:8081
    environment:
      ME_CONFIG_BASICAUTH: false
      ME_CONFIG_MONGODB_URL: mongodb://mongo

  backend:
    build: .
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./files:/app/files
    environment:
      INTERNAL_URL: http://backend:3000
      GOTENBERG_URL: http://gotenberg:3000
      JWT_SECRET: thisisabadsecretthisisabadsecret
      MONGODB_URI: mongodb://mongo/ClickPrint?authSource=admin
      NOTIFYBOT_URL: http://notifybot:3000/send?apiKey=thisisabadapikeythisisabadapikey